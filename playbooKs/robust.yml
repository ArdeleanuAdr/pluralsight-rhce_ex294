---
- name: Test error Handling
  hosts: localhost
  gather_facts: true
  become: true
  ignore_errors: false

  tasks:
    - name: Install Apache (Ubuntu)
      when: ansible_facts['os_family'] == 'Debian'
      ansible.builtin.apt:
        name: apache2
        update_cache: true
        state: present         

    - name: Install Apache (RHEL)
      when: ansible_facts['os_family'] == 'RedHat'
      ansible.builtin.dnf:
        name: httpd
        update_cache: true
        state: present

    - name: Set web page
      ansible.builtin.copy:
        src: /web/index.html
        dest: /var/www/hrml/index.html
      ignore_errors: true
      register: result

    - name: Fallback page
      when: result.failed
      ansible.builtin.copy:
        content: Page not ready
        dest: /var/www/html/index.html
