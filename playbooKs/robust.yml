---
- name: Test error Handling
  hosts: localhost
  gather_facts: true
  become: true
  ignore_errors: false

  tasks:
    - name: Install Apache (Ubuntu)
      when: ansible_facts['os_family'] == 'Debian'
      ansible.builtin.apt:
        name: apache2
        update_cache: true
        state: present         

    - name: Install Apache (RHEL)
      when: ansible_facts['os_family'] == 'RedHat'
      ansible.builtin.dnf:
        name: httpd
        update_cache: true
        state: present
